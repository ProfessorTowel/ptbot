<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cortana</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020408;color:#c8e0ff;font-family:"Segoe UI",sans-serif;
     height:100vh;display:grid;grid-template-columns:1fr 280px;overflow:hidden}

/* ORB SECTION */
.orb-section{display:flex;flex-direction:column;align-items:center;
              justify-content:center;gap:24px;padding:20px;position:relative}
.orb-wrap{position:relative;width:180px;height:180px}
.orb{width:180px;height:180px;border-radius:50%;
     background:radial-gradient(circle at 35% 35%,#4cc9f0,#00e5ff 30%,#9b5de5 60%,#020408);
     box-shadow:0 0 40px rgba(0,229,255,0.4),0 0 80px rgba(155,93,229,0.2),
                inset 0 0 40px rgba(0,0,0,0.5);
     animation:breathe 3s ease-in-out infinite;cursor:pointer;transition:all .3s}
.orb.listening{animation:pulse-listen 0.8s ease-in-out infinite;
               box-shadow:0 0 60px rgba(0,255,157,0.6),0 0 120px rgba(0,255,157,0.3)}
.orb.speaking{animation:pulse-speak 0.5s ease-in-out infinite;
              box-shadow:0 0 60px rgba(76,201,240,0.8),0 0 120px rgba(76,201,240,0.4)}
.orb.thinking{animation:spin-glow 1s linear infinite}

@keyframes breathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:1}}
@keyframes pulse-listen{0%,100%{transform:scale(1.05)}50%{transform:scale(1.12)}}
@keyframes pulse-speak{0%,100%{transform:scale(1)}25%{transform:scale(1.08)}75%{transform:scale(0.97)}}
@keyframes spin-glow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

.orb-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,0.15);
      top:50%;left:50%;transform:translate(-50%,-50%);animation:expand 3s ease-out infinite}
.ring:nth-child(1){width:220px;height:220px;animation-delay:0s}
.ring:nth-child(2){width:280px;height:280px;animation-delay:1s}
.ring:nth-child(3){width:340px;height:340px;animation-delay:2s}
@keyframes expand{0%{opacity:.4;transform:translate(-50%,-50%) scale(0.9)}
                   100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}

.status-text{font-size:11px;letter-spacing:3px;text-transform:uppercase;
             color:rgba(0,229,255,0.6);margin-top:8px}

/* CHAT */
.chat-wrap{width:100%;max-width:600px}
.messages{height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
          padding:8px 0;margin-bottom:12px}
.msg{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;max-width:90%}
.msg.user{background:rgba(76,201,240,0.1);border:1px solid rgba(76,201,240,0.2);
          color:#4cc9f0;align-self:flex-end}
.msg.cortana{background:rgba(155,93,229,0.1);border:1px solid rgba(155,93,229,0.2);
             color:#c8e0ff;align-self:flex-start}
.msg.system{background:rgba(0,0,0,0.3);color:rgba(100,130,160,0.8);
            font-size:10px;text-align:center;align-self:center;border:none}

.input-row{display:flex;gap:8px}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(0,229,255,0.2);
            color:#c8e0ff;padding:10px 14px;border-radius:8px;font-size:13px;outline:none}
.chat-input:focus{border-color:rgba(0,229,255,0.5)}
.send-btn{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);
          color:#4cc9f0;padding:10px 16px;border-radius:8px;cursor:pointer;
          font-size:12px;letter-spacing:1px;transition:.2s}
.send-btn:hover{background:rgba(0,229,255,0.2)}
.mic-btn{background:rgba(155,93,229,0.1);border:1px solid rgba(155,93,229,0.3);
         color:#9b5de5;padding:10px 14px;border-radius:8px;cursor:pointer;
         font-size:16px;transition:.2s}
.mic-btn.active{background:rgba(0,255,157,0.15);border-color:rgba(0,255,157,0.4);color:#00ff9d}

/* SIDEBAR */
.sidebar{background:#06090f;border-left:1px solid #0f1e38;padding:16px;
         overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.sidebar-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;
               color:rgba(100,130,160,0.5);margin-bottom:4px}
.stat-card{background:rgba(255,255,255,0.02);border:1px solid #0f1e38;
           border-radius:8px;padding:10px}
.stat-label{font-size:9px;color:rgba(100,130,160,0.6);letter-spacing:1px;
            text-transform:uppercase;margin-bottom:4px}
.stat-val{font-family:"JetBrains Mono","Courier New",monospace;font-size:14px;
          font-weight:600;color:#c8e0ff}
.green{color:#00ff9d}.red{color:#ff2d55}.cyan{color:#4cc9f0}.purple{color:#9b5de5}

.memory-list{max-height:200px;overflow-y:auto}
.memory-item{font-size:10px;color:rgba(100,130,160,0.7);padding:3px 0;
             border-bottom:1px solid rgba(15,30,56,.3);line-height:1.4}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#0f1e38;border-radius:2px}
</style>
</head>
<body>

<!-- ORB SECTION -->
<div class="orb-section">
  <div class="orb-wrap">
    <div class="orb-rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>
    <div class="orb" id="orb" onclick="toggleMic()" title="Click to speak"></div>
  </div>
  <div class="status-text" id="orbStatus">READY</div>

  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="msg system">Cortana online — click orb or type below</div>
    </div>
    <div class="input-row">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <input class="chat-input" id="chatInput" placeholder="Message Cortana..."
             onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" onclick="sendMsg()">SEND</button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="sidebar-title">Bot Status</div>
    <div class="stat-card">
      <div class="stat-label">Daily P&L</div>
      <div class="stat-val" id="s-pnl">--</div>
    </div>
    <div class="stat-card" style="margin-top:6px">
      <div class="stat-label">Position</div>
      <div class="stat-val" id="s-pos">FLAT</div>
    </div>
    <div class="stat-card" style="margin-top:6px">
      <div class="stat-label">ICT Score</div>
      <div class="stat-val" id="s-score">--</div>
    </div>
    <div class="stat-card" style="margin-top:6px">
      <div class="stat-label">Session</div>
      <div class="stat-val" id="s-sess" style="font-size:10px">--</div>
    </div>
    <div class="stat-card" style="margin-top:6px">
      <div class="stat-label">Balance</div>
      <div class="stat-val cyan" id="s-bal">--</div>
    </div>
  </div>

  <div>
    <div class="sidebar-title">Recent Memory</div>
    <div class="memory-list" id="memList">
      <div class="memory-item">Loading memories...</div>
    </div>
  </div>

  <div>
    <div class="sidebar-title">Quick Commands</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <button onclick="quickSend('what is the bot status')"
        style="background:rgba(0,255,157,.06);border:1px solid rgba(0,255,157,.15);
               color:#00ff9d;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        📈 Bot Status
      </button>
      <button onclick="quickSend('what do you see on my screen')"
        style="background:rgba(76,201,240,.06);border:1px solid rgba(76,201,240,.15);
               color:#4cc9f0;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        👁 Screen Vision
      </button>
      <button onclick="quickSend('inject knowledge into the trading LLM')"
        style="background:rgba(155,93,229,.06);border:1px solid rgba(155,93,229,.15);
               color:#9b5de5;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        🧠 Inject Knowledge
      </button>
      <button onclick="quickSend('read the last 20 lines of the bot log')"
        style="background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.15);
               color:#ff6b35;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        📋 Bot Logs
      </button>
      <button onclick="quickSend('show me the lead pipeline status')"
        style="background:rgba(255,214,10,.06);border:1px solid rgba(255,214,10,.15);
               color:#ffd60a;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        🎯 Lead Pipeline
      </button>
      <button onclick="quickSend('restart the trading bot')"
        style="background:rgba(255,45,85,.06);border:1px solid rgba(255,45,85,.15);
               color:#ff2d55;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left">
        🔄 Restart Bot
      </button>
    </div>
  </div>
</div>

const WS_URL = 'ws://localhost:
